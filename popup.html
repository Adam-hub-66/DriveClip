<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Downloader</title>
    <style>
        :root {
            --bg:      #0d0f14;
            --surface: #161921;
            --card:    #1e222e;
            --border:  rgba(255,255,255,0.07);
            --accent:  #3d8bff;
            --accent2: #5e6aff;
            --green:   #22d97a;
            --red:     #ff4f5e;
            --text:    #e8eaf0;
            --muted:   #5a607a;
            --glow:    rgba(61,139,255,0.22);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, 'Segoe UI', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            width: 350px;
            height: 360px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            overflow: hidden;
        }

        /* ambient glow */
        body::before {
            content: '';
            position: fixed;
            width: 180px; height: 180px;
            border-radius: 50%;
            background: rgba(61,139,255,0.09);
            filter: blur(65px);
            top: -50px; right: -50px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── HIDDEN utility (same as original) ── */
        .hidden { display: none !important; }

        /* ── HEADER ── */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            padding: 13px 16px 11px;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        /* h1 inside .header */
        .header h1 {
            font-size: 13px;
            font-weight: 700;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 9px;
        }
        .logo {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, #1a3050, #0d1b2e);
            display: flex; align-items: center; justify-content: center;
            box-shadow: 0 0 14px var(--glow);
            flex-shrink: 0;
            overflow: hidden;
        }

        /* ── BUTTON GROUP ── */
        .button-group {
            display: flex;
            gap: 6px;
            align-items: center;
        }

        /* reload button */
        .reload-btn {
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--muted);
            width: 28px; height: 28px;
            border-radius: 7px;
            cursor: pointer;
            font-size: 15px;
            display: none;           /* JS adds .active to show it */
            align-items: center;
            justify-content: center;
            transition: all .2s;
        }
        .reload-btn.active { display: flex; }
        .reload-btn:hover  { color: var(--text); border-color: rgba(255,255,255,0.18); }

        /* ON / OFF buttons */
        .state-btn {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid var(--border);
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 0.06em;
            cursor: pointer;
            background: transparent;
            color: var(--muted);
            transition: all .2s;
        }
        .btn-on  { background: rgba(34,217,122,0.13); color: var(--green); border-color: rgba(34,217,122,0.28); }
        .btn-off { background: rgba(255,79,94,0.12);  color: var(--red);   border-color: rgba(255,79,94,0.28); }
        .state-btn:disabled             { opacity: 0.35; cursor: not-allowed; }
        .state-btn:not(:disabled):hover { filter: brightness(1.2); transform: translateY(-1px); }

        /* ── NOT DRIVE MESSAGE ── */
        #notDriveMessage {
            padding: 20px;
            text-align: center;
            font-size: 13px;
            line-height: 1.7;
            color: var(--muted);
            margin-top: 50px;
        }

        /* ── DOWNLOAD CONTAINER ── */
        #downloadContainer {
            width: 100%;
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding: 12px 14px 6px;
        }
        #downloadContainer::-webkit-scrollbar       { width: 3px; }
        #downloadContainer::-webkit-scrollbar-track { background: transparent; }
        #downloadContainer::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

        /* video card — JS creates these with class "video-item" */
        .video-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            padding: 10px 12px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 10px;
            width: 100%;
            transition: border-color .2s, background .2s;
        }
        .video-item:hover { border-color: rgba(61,139,255,0.28); background: #202638; }

        /* span.video-title — created by JS */
        .video-title {
            flex: 1;
            font-size: 12.5px;
            font-weight: 600;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* button.download-btn — created by JS */
        .download-btn {
            width: 32px; height: 32px;
            border-radius: 8px;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            border: none;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            transition: all .2s;
            box-shadow: 0 2px 10px rgba(61,139,255,0.28);
        }
        .download-btn:hover  { transform: scale(1.1) translateY(-1px); box-shadow: 0 4px 16px rgba(61,139,255,0.45); }
        .download-btn:active { transform: scale(0.92); }

        /* ── STATUS MESSAGE ── */
        #statusMessage {
            width: 100%;
            font-size: 12px;
            color: var(--muted);
            text-align: center;
            padding: 6px 16px 8px;
            flex-shrink: 0;
        }
        #statusMessage.error { color: var(--red); }

        /* ── FOOTER ── */
        footer {
            width: 100%;
            padding: 8px 14px;
            background: var(--surface);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .f-author {
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.04em;
        }
        .donate-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid rgba(255,180,0,0.3);
            background: rgba(255,180,0,0.08);
            color: #f5c842;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }
        .donate-btn:hover {
            background: rgba(255,180,0,0.18);
            border-color: rgba(255,180,0,0.5);
            transform: translateY(-1px);
        }
        .insta-btn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 11px;
            border-radius: 20px;
            border: 1px solid rgba(225,48,108,0.3);
            background: rgba(225,48,108,0.08);
            color: #e1306c;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.04em;
            cursor: pointer;
            text-decoration: none;
            transition: all .2s;
        }
        .insta-btn:hover {
            background: rgba(225,48,108,0.18);
            border-color: rgba(225,48,108,0.5);
            transform: translateY(-1px);
        }
    </style>
</head>
<body>

    <!-- .header — JS does querySelector('.header') -->
    <div class="header hidden">
        <h1>
            <span class="logo">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="28" height="28">
                  <defs>
                    <linearGradient id="dlg" x1="0" y1="0" x2="0" y2="1">
                      <stop offset="0%" stop-color="#3d8bff"/>
                      <stop offset="100%" stop-color="#5e6aff"/>
                    </linearGradient>
                  </defs>
                  <path d="M15.5 27 Q15.8 19 14.8 13 Q16 12.5 17.2 13 Q16.2 19 16.5 27Z" fill="#c8a96e"/>
                  <path d="M16 13 Q8 8 2 11 Q7 15 16 14Z" fill="#22d97a"/>
                  <path d="M16 13 Q24 8 30 11 Q25 15 16 14Z" fill="#22d97a"/>
                  <path d="M16 13 Q14.5 6.5 16 2 Q17.5 6.5 16 13Z" fill="#2ecc71"/>
                  <circle cx="22" cy="23" r="8.5" fill="url(#dlg)"/>
                  <path d="M22 18.5 L22 25.5 M19 23 L22 26.5 L25 23" stroke="white" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
                  <line x1="19" y1="27.5" x2="25" y2="27.5" stroke="white" stroke-width="1.9" stroke-linecap="round"/>
                </svg>
            </span>
            DriveClip
        </h1>
        <div class="button-group">
            <!-- .reload-btn — JS does querySelector('.reload-btn') -->
            <button class="reload-btn" title="Retry">↻</button>
            <!-- #btnOn / #btnOff — JS does getElementById -->
            <button class="state-btn btn-on"  id="btnOn">ON</button>
            <button class="state-btn btn-off" id="btnOff" disabled>OFF</button>
        </div>
    </div>

    <!-- #notDriveMessage — JS does getElementById -->
    <div id="notDriveMessage" class="hidden">
        Works only on Google Drive video pages.<br>Navigate to a Drive video to begin.
    </div>

    <!-- #downloadContainer — JS does getElementById + innerHTML + appendChild -->
    <div id="downloadContainer" class="hidden"></div>

    <!-- #statusMessage — JS does getElementById + textContent + classList -->
    <div id="statusMessage" class="hidden"></div>

    <footer>
        <span class="f-author">by adam nekhla</span>
        <a class="donate-btn" href="https://www.instagram.com/adam__nekhla/" target="_blank">
            📸 Follow me
        </a>
    </footer>

    <script src="popup.js"></script>
</body>
</html>
